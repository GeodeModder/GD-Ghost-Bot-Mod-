name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # Updated to use the correct modern parameter name and value
          platform: ANDROID

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geode-android-build
          path: build/*.geode
